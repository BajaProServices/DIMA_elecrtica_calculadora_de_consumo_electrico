<index.html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotizador Solar | BAJA PRO-SERVICES</title>
    <style>
        :root {
            /* Paleta Esmeralda Claro y Profesional */
            --emerald-light: #ecfdf5; /* Fondo general */
            --emerald-primary: #10b981; /* Verde esmeralda principal */
            --emerald-dark: #065f46; /* Texto y acentos oscuros */
            --primary-blue: #1a2e41; /* Manteniendo azul marino para contraste */
            --accent-orange: #f59e0b; /* Ambar para resaltar resultados */
            --bg-white: #ffffff;
            --text-gray: #4b5563;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--emerald-light);
            margin: 0;
            padding: 0;
            color: var(--emerald-dark);
            transition: all 0.3s ease;
        }

        .hero-container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            line-height: 0;
            position: relative;
        }

        .hero-image {
            width: 100%;
            height: auto;
            border-bottom: 4px solid var(--emerald-primary);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .container {
            max-width: 600px;
            margin: -30px auto 50px;
            background: var(--bg-white);
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            position: relative;
            z-index: 10;
        }

        /* Selector de Idioma */
        .lang-switch {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-bottom: 15px;
        }

        .lang-btn {
            background: var(--emerald-light);
            border: 1px solid var(--emerald-primary);
            color: var(--emerald-dark);
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 700;
            font-size: 12px;
        }

        .lang-btn.active {
            background: var(--emerald-primary);
            color: white;
        }

        header {
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 2px solid var(--emerald-light);
            padding-bottom: 15px;
        }

        header h1 { color: var(--primary-blue); font-size: 26px; margin: 0; }

        .section-title {
            font-weight: 700;
            margin: 20px 0 10px;
            display: block;
            border-left: 4px solid var(--emerald-primary);
            padding-left: 12px;
            color: var(--emerald-dark);
            text-transform: uppercase;
            font-size: 14px;
        }

        label { display: block; margin-bottom: 5px; font-size: 13px; font-weight: 600; }

        input, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            box-sizing: border-box;
            transition: all 0.3s;
        }

        input:focus, select:focus {
            border-color: var(--emerald-primary);
            outline: none;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }

        .inputs-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            background: var(--emerald-light);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .result-box {
            background: var(--primary-blue);
            color: white;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            border-bottom: 6px solid var(--emerald-primary);
        }

        .result-value {
            font-size: 36px;
            font-weight: 800;
            color: var(--emerald-primary);
            margin: 5px 0;
        }

        .contact-selector {
            background: #fff8eb;
            border: 1px dashed var(--accent-orange);
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
        }

        button.btn-whatsapp {
            width: 100%;
            background-color: var(--emerald-primary);
            color: white;
            padding: 18px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        button.btn-whatsapp:hover {
            background-color: var(--emerald-dark);
            transform: translateY(-2px);
        }

        .hidden { display: none; }

        @media (max-width: 520px) {
            .inputs-grid { grid-template-columns: 1fr; }
            .container { width: 92%; padding: 20px; }
        }
    </style>
</head>
<body>

<div class="hero-container">
    <img src="DIMA.jpg" alt="DIMA Hero" class="hero-image">
</div>

<div class="container">
    <div class="lang-switch">
        <button class="lang-btn active" onclick="setLanguage('es')">ES</button>
        <button class="lang-btn" onclick="setLanguage('en')">EN</button>
    </div>

    <header>
        <h1 id="main-title">BAJA PRO-SERVICES</h1>
        <p id="sub-title">La Paz, Baja California Sur, MX</p>
    </header>

    <form id="solarForm">
        <span class="section-title" data-key="sec-client">Información del Cliente</span>
        <input type="text" id="nombre" placeholder="Nombre completo" required>
        <input type="tel" id="telefono" placeholder="WhatsApp (10 dígitos)" required>
        <input type="text" id="direccion" placeholder="Dirección / Colonia" required>

        <span class="section-title" data-key="sec-usage">Datos de Consumo (kWh)</span>
        <label data-key="lbl-tariff">Tipo de Tarifa</label>
        <select id="tipoTarifa" onchange="alternarInputsConsumo()">
            <option value="bimestral" data-key="opt-res">Residencial (6 Bimestres)</option>
            <option value="mensual" data-key="opt-com">Comercial (12 Meses)</option>
        </select>

        <div id="apartadosBimestrales" class="inputs-grid">
            <div><label data-key="b1">Bimestre 1</label><input type="number" class="consumo-in" oninput="calcular()"></div>
            <div><label data-key="b2">Bimestre 2</label><input type="number" class="consumo-in" oninput="calcular()"></div>
            <div><label data-key="b3">Bimestre 3</label><input type="number" class="consumo-in" oninput="calcular()"></div>
            <div><label data-key="b4">Bimestre 4</label><input type="number" class="consumo-in" oninput="calcular()"></div>
            <div><label data-key="b5">Bimestre 5</label><input type="number" class="consumo-in" oninput="calcular()"></div>
            <div><label data-key="b6">Bimestre 6</label><input type="number" class="consumo-in" oninput="calcular()"></div>
        </div>

        <div id="apartadosMensuales" class="inputs-grid hidden">
            <div><label data-key="m1">Enero</label><input type="number" class="consumo-in-m" oninput="calcular()"></div>
            <div><label data-key="m2">Febrero</label><input type="number" class="consumo-in-m" oninput="calcular()"></div>
            <div><label data-key="m3">Marzo</label><input type="number" class="consumo-in-m" oninput="calcular()"></div>
            <div><label data-key="m4">Abril</label><input type="number" class="consumo-in-m" oninput="calcular()"></div>
            <div><label data-key="m5">Mayo</label><input type="number" class="consumo-in-m" oninput="calcular()"></div>
            <div><label data-key="m6">Junio</label><input type="number" class="consumo-in-m" oninput="calcular()"></div>
            <div><label data-key="m7">Julio</label><input type="number" class="consumo-in-m" oninput="calcular()"></div>
            <div><label data-key="m8">Agosto</label><input type="number" class="consumo-in-m" oninput="calcular()"></div>
            <div><label data-key="m9">Septiembre</label><input type="number" class="consumo-in-m" oninput="calcular()"></div>
            <div><label data-key="m10">Octubre</label><input type="number" class="consumo-in-m" oninput="calcular()"></div>
            <div><label data-key="m11">Noviembre</label><input type="number" class="consumo-in-m" oninput="calcular()"></div>
            <div><label data-key="m12">Diciembre</label><input type="number" class="consumo-in-m" oninput="calcular()"></div>
        </div>

        <label data-key="lbl-panel">Potencia del Panel (W)</label>
        <select id="potenciaPanel" onchange="calcular()">
            <option value="550">550W</option>
            <option value="620">620W</option>
            <option value="650">650W</option>
            <option value="720">720W</option>
        </select>

        <div class="result-box">
            <div id="res-label" style="font-size: 13px; opacity: 0.9;">SISTEMA SUGERIDO (+10% POTENCIA):</div>
            <div class="result-value"><span id="panelCount">0</span> <span data-key="res-panels">PANELES</span></div>
            <div id="res-detail" style="font-size: 14px;">Total: <span id="kwhTotal">0</span> kWh/Año</div>
        </div>

        <div class="contact-selector">
            <label data-key="lbl-contact">Seleccionar Departamento:</label>
            <select id="contactSelect">
                <option value="5216243554783">RAFAEL (VENTAS / SALES)</option>
                <option value="5216122198325">SOPORTE TÉCNICO (TECH SUPPORT)</option>
            </select>
        </div>

        <button type="button" class="btn-whatsapp" onclick="enviarWhatsApp()">
            <span data-key="btn-send">SOLICITAR COTIZACIÓN</span>
        </button>
    </form>
</div>

<script>
    let currentLang = 'es';
    const translations = {
        es: {
            "sec-client": "Información del Cliente",
            "sec-usage": "Datos de Consumo (kWh)",
            "lbl-tariff": "Tipo de Tarifa",
            "opt-res": "Residencial (6 Bimestres)",
            "opt-com": "Comercial (12 Meses)",
            "lbl-panel": "Potencia del Panel (W)",
            "lbl-contact": "Seleccionar Departamento:",
            "res-panels": "PANELES",
            "btn-send": "SOLICITAR COTIZACIÓN VIA WHATSAPP",
            "b1":"Bimestre 1","b2":"Bimestre 2","b3":"Bimestre 3","b4":"Bimestre 4","b5":"Bimestre 5","b6":"Bimestre 6",
            "m1":"Ene","m2":"Feb","m3":"Mar","m4":"Abr","m5":"May","m6":"Jun","m7":"Jul","m8":"Ago","m9":"Sep","m10":"Oct","m11":"Nov","m12":"Dic"
        },
        en: {
            "sec-client": "Customer Information",
            "sec-usage": "Usage Data (kWh)",
            "lbl-tariff": "Tariff Type",
            "opt-res": "Residential (6 Bimonthly)",
            "opt-com": "Commercial (12 Months)",
            "lbl-panel": "Panel Power (W)",
            "lbl-contact": "Select Department:",
            "res-panels": "PANELS",
            "btn-send": "REQUEST QUOTE VIA WHATSAPP",
            "b1":"Period 1","b2":"Period 2","b3":"Period 3","b4":"Period 4","b5":"Period 5","b6":"Period 6",
            "m1":"Jan","m2":"Feb","m3":"Mar","m4":"Apr","m5":"May","m6":"Jun","m7":"Jul","m8":"Aug","m9":"Sep","m10":"Oct","m11":"Nov","m12":"Dec"
        }
    };

    function setLanguage(lang) {
        currentLang = lang;
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        
        document.querySelectorAll('[data-key]').forEach(el => {
            const key = el.getAttribute('data-key');
            if (translations[lang][key]) el.innerText = translations[lang][key];
        });

        // Placeholders
        document.getElementById('nombre').placeholder = lang === 'es' ? "Nombre completo" : "Full name";
        document.getElementById('telefono').placeholder = lang === 'es' ? "WhatsApp (10 dígitos)" : "WhatsApp (10 digits)";
        document.getElementById('direccion').placeholder = lang === 'es' ? "Dirección" : "Address";
    }

    function alternarInputsConsumo() {
        const tipo = document.getElementById('tipoTarifa').value;
        document.getElementById('apartadosBimestrales').classList.toggle('hidden', tipo !== 'bimestral');
        document.getElementById('apartadosMensuales').classList.toggle('hidden', tipo !== 'mensual');
        calcular();
    }

    function calcular() {
        const tipo = document.getElementById('tipoTarifa').value;
        const panelW = parseFloat(document.getElementById('potenciaPanel').value);
        let sumaAnual = 0;
        const inputs = (tipo === 'bimestral') ? document.querySelectorAll('.consumo-in') : document.querySelectorAll('.consumo-in-m');

        inputs.forEach(i => sumaAnual += (parseFloat(i.value) || 0));
        document.getElementById('kwhTotal').innerText = sumaAnual.toLocaleString();

        if (sumaAnual <= 0) return;

        // La Paz HSP 5.5, Eficiencia 0.8
        let kwhDiario = sumaAnual / 365;
        let numPaneles = (kwhDiario * 1000) / (panelW * 5.5 * 0.8);
        let conMargen = numPaneles * 1.10;
        let final = Math.ceil(conMargen);
        if (final % 2 !== 0) final++;

        document.getElementById('panelCount').innerText = final;
    }

    function enviarWhatsApp() {
        const name = document.getElementById('nombre').value;
        const panels = document.getElementById('panelCount').innerText;
        const phoneTo = document.getElementById('contactSelect').value;
        
        if (!name || panels === "0") {
            alert(currentLang === 'es' ? "Por favor complete los datos" : "Please fill in the data");
            return;
        }

        const msg = currentLang === 'es' 
            ? `Hola, mi nombre es ${name}. He usado su cotizador solar y necesito un sistema de ${panels} paneles de ${document.getElementById('potenciaPanel').value}W. ¿Me pueden ayudar?`
            : `Hello, my name is ${name}. I used your solar calculator and I need a system with ${panels} panels of ${document.getElementById('potenciaPanel').value}W. Can you help me?`;

        window.open(`https://wa.me/${phoneTo}?text=${encodeURIComponent(msg)}`, '_blank');
    }
</script>

</body>
</html>
