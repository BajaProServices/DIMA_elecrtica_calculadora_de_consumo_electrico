<index.html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotizador Solar Profesional | BAJA PRO-SERVICES</title>
    <style>
        :root {
            --primary-blue: #1a2e41; 
            --accent-orange: #ff7f00; 
            --text-dark: #2c3e50;
            --success-green: #27ae60;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f0f4f7;
            margin: 0;
            padding: 0;
            color: var(--text-dark);
        }

        .hero-container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            line-height: 0;
        }

        .hero-image {
            width: 100%;
            height: auto;
            border-bottom: 3px solid var(--primary-blue);
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }

        .container {
            max-width: 600px;
            margin: -30px auto 50px;
            background: white;
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            position: relative;
            z-index: 10;
        }

        header { text-align: center; margin-bottom: 30px; }
        header h1 { color: var(--primary-blue); margin: 0; font-size: 26px; }

        .section-title {
            font-weight: 700;
            margin: 25px 0 12px;
            display: block;
            border-left: 4px solid var(--accent-orange);
            padding-left: 12px;
            color: var(--primary-blue);
            text-transform: uppercase;
            font-size: 14px;
        }

        label { display: block; margin-bottom: 5px; font-size: 13px; font-weight: 600; color: var(--primary-blue); }
        
        input, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 15px;
        }

        /* Grid para meses/bimestres */
        .inputs-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            background: #f9f9f9;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .result-box {
            background: var(--primary-blue);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border-bottom: 6px solid var(--accent-orange);
        }

        .result-value { font-size: 32px; font-weight: 800; color: var(--accent-orange); }

        button {
            width: 100%;
            background-color: var(--success-green);
            color: white;
            padding: 18px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 20px;
        }

        .hidden { display: none; }

        @media (max-width: 500px) {
            .inputs-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="hero-container">
    <img src="https://i.ibb.co/XRTmGzN/DIMA.jpg" alt="DIMA ELECTRICA Hero" class="hero-image">
</div>

<div class="container">
    <header>
        <h1>BAJA PRO-SERVICES</h1>
        <p style="font-size: 12px; color: gray;">SISTEMAS FOTOVOLTAICOS PROFESIONALES</p>
    </header>

    <form id="solarForm">
        <span class="section-title">Datos del Cliente</span>
        <input type="text" id="nombre" placeholder="Nombre completo" required>
        <input type="tel" id="telefono" placeholder="WhatsApp (10 dígitos)" required>
        <input type="text" id="direccion" placeholder="Colonia / Ubicación" required>

        <span class="section-title">Configuración de Tarifa</span>
        <label>Tipo de Contrato</label>
        <select id="tipoTarifa" onchange="toggleInputs()">
            <option value="bimestral">Residencial (6 Bimestres)</option>
            <option value="mensual">Comercial (12 Meses)</option>
        </select>

        <label>Potencia de Panel (W)</label>
        <select id="potenciaPanel" onchange="calcular()">
            <option value="550">550W</option>
            <option value="620">620W</option>
            <option value="650">650W</option>
            <option value="720">720W</option>
        </select>

        <span class="section-title">Consumo en kWh (Último Año)</span>
        
        <div id="gridBimestral" class="inputs-grid">
            <div><label>Bimestre 1</label><input type="number" class="consumo-in" placeholder="0"></div>
            <div><label>Bimestre 2</label><input type="number" class="consumo-in" placeholder="0"></div>
            <div><label>Bimestre 3</label><input type="number" class="consumo-in" placeholder="0"></div>
            <div><label>Bimestre 4</label><input type="number" class="consumo-in" placeholder="0"></div>
            <div><label>Bimestre 5</label><input type="number" class="consumo-in" placeholder="0"></div>
            <div><label>Bimestre 6</label><input type="number" class="consumo-in" placeholder="0"></div>
        </div>

        <div id="gridMensual" class="inputs-grid hidden">
            <div><label>Ene</label><input type="number" class="consumo-in-m" placeholder="0"></div>
            <div><label>Feb</label><input type="number" class="consumo-in-m" placeholder="0"></div>
            <div><label>Mar</label><input type="number" class="consumo-in-m" placeholder="0"></div>
            <div><label>Abr</label><input type="number" class="consumo-in-m" placeholder="0"></div>
            <div><label>May</label><input type="number" class="consumo-in-m" placeholder="0"></div>
            <div><label>Jun</label><input type="number" class="consumo-in-m" placeholder="0"></div>
            <div><label>Jul</label><input type="number" class="consumo-in-m" placeholder="0"></div>
            <div><label>Ago</label><input type="number" class="consumo-in-m" placeholder="0"></div>
            <div><label>Sep</label><input type="number" class="consumo-in-m" placeholder="0"></div>
            <div><label>Oct</label><input type="number" class="consumo-in-m" placeholder="0"></div>
            <div><label>Nov</label><input type="number" class="consumo-in-m" placeholder="0"></div>
            <div><label>Dic</label><input type="number" class="consumo-in-m" placeholder="0"></div>
        </div>

        <div class="result-box">
            <div style="font-size: 12px; opacity: 0.8;">PROMEDIO DIARIO: <span id="promedioDiario">0</span> kWh</div>
            <div class="result-value"><span id="panelCount">0</span> PANELES</div>
            <div style="font-size: 14px;">Inversor Sugerido: <span id="inverterSize">0</span> kW</div>
        </div>

        <button type="button" onclick="enviarWhatsApp()">ENVIAR COTIZACIÓN A WHATSAPP</button>
    </form>
</div>

<script>
    function toggleInputs() {
        const tipo = document.getElementById('tipoTarifa').value;
        document.getElementById('gridBimestral').classList.toggle('hidden', tipo !== 'bimestral');
        document.getElementById('gridMensual').classList.toggle('hidden', tipo !== 'mensual');
        calcular();
    }

    function calcular() {
        const tipo = document.getElementById('tipoTarifa').value;
        const panelW = parseFloat(document.getElementById('potenciaPanel').value);
        let inputs = (tipo === 'bimestral') ? 
            document.querySelectorAll('.consumo-in') : 
            document.querySelectorAll('.consumo-in-m');
        
        let sumaAnual = 0;
        inputs.forEach(i => sumaAnual += (parseFloat(i.value) || 0));
        
        if (sumaAnual === 0) return;

        // Promedio diario (365 días)
        let kwhDiario = sumaAnual / 365;
        document.getElementById('promedioDiario').innerText = kwhDiario.toFixed(2);

        // Cálculo: (kWh_diario * 1000) / (W_panel * HSP_LaPaz 5.5 * Eficiencia 0.8)
        let numPanelesBase = (kwhDiario * 1000) / (panelW * 5.5 * 0.8);
        
        // +10% de margen
        let numPanelesConExtra = numPanelesBase * 1.10;

        // Redondeo a PARES superior
        let finalPaneles = Math.ceil(numPanelesConExtra);
        if (finalPaneles % 2 !== 0) finalPaneles++;

        // Inversor (Potencia instalada * 0.9 para dimensionamiento real)
        let potenciaKW = (finalPaneles * panelW) / 1000;
        let invSug = (potenciaKW * 0.9).toFixed(1);

        document.getElementById('panelCount').innerText = finalPaneles;
        document.getElementById('inverterSize').innerText = invSug;
    }

    // Escuchar cambios en todos los inputs
    document.querySelectorAll('input').forEach(el => {
        el.addEventListener('input', calcular);
    });

    function enviarWhatsApp() {
        const nombre = document.getElementById('nombre').value;
        const paneles = document.getElementById('panelCount').innerText;
        const inversor = document.getElementById('inverterSize').innerText;
        const pW = document.getElementById('potenciaPanel').value;
        const tipo = document.getElementById('tipoTarifa').value;

        if(!nombre || paneles == "0") { alert("Por favor ingresa datos de consumo."); return; }

        const msg = `*SOLICITUD DE COTIZACIÓN - BAJA PRO-SERVICES*%0A` +
                    `👤 *Cliente:* ${nombre}%0A` +
                    `📋 *Contrato:* ${tipo.toUpperCase()}%0A` +
                    `☀️ *Sistema:* ${paneles} paneles de ${pW}W%0A` +
                    `🔌 *Inversor:* ${inversor} kW sugerido%0A` +
                    `----------------------------%0A` +
                    `_Cálculo basado en promedio anual +10% de reserva._`;

        window.open(`https://wa.me/526122198325?text=${msg}`, '_blank');
    }
</script>

</body>
</html>
